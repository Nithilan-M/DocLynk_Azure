name: Deploy Backend Docker to Azure

on:
  push:
    branches: [main]
    paths:
      - 'modern-azure/backend/**'
      - '.github/workflows/deploy-backend-docker.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: doclynkregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          cd modern-azure/backend
          docker build -t doclynkregistry.azurecr.io/doclynk-backend:latest .
          docker push doclynkregistry.azurecr.io/doclynk-backend:latest


